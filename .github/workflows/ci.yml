name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint frontend
        run: corepack pnpm lint:web

      - name: Typecheck frontend
        run: corepack pnpm typecheck

      - name: Test frontend
        run: corepack pnpm test:web

      - name: Build frontend
        run: corepack pnpm build:web

  rust:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Run Rust checks
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

  desktop-smoke-windows:
    runs-on: windows-latest
    needs: [frontend, rust]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build desktop smoke bundle
        run: corepack pnpm build:desktop:smoke

  desktop-smoke-linux:
    runs-on: ubuntu-latest
    needs: [frontend, rust]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux prerequisites
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build desktop smoke bundle
        run: corepack pnpm build:desktop:smoke
